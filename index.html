<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hertify | Shop Beauty</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --purple:#5B3DF5;
    --purple-dark:#4527C4;
    --ink:#171321;
    --grey:#6E6E76;
    --bg:#FAFAFA;
    --card:#F2F1F5;
    --red:#E63950;
    --gold:#D9A441;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html, body{overflow-x:hidden; max-width:100vw;}
  body{font-family:'Poppins', sans-serif; background:#fff; color:var(--ink);}
  a{text-decoration:none; color:inherit;}

  .layout{display:flex; min-height:100vh; overflow-x:hidden; width:100%;}

  .sidebar{
    width:76px; background:#fff; border-right:1px solid #eee;
    display:flex; flex-direction:column; align-items:center;
    padding:24px 0; position:fixed; top:0; left:0; bottom:0; gap:8px;
  }
  .sidebar .logo-mark{font-weight:900; font-size:1.4rem; color:var(--purple); margin-bottom:30px;}
  .side-btn{
    width:48px; height:48px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    color:var(--grey); cursor:pointer; transition:background .2s, color .2s; position:relative;
  }
  .side-btn:hover{background:var(--card);}
  .side-btn.active{background:var(--purple); color:#fff;}
  .side-btn .badge{
    position:absolute; top:2px; right:2px; background:var(--red); color:#fff;
    font-size:0.62rem; font-weight:700; width:16px; height:16px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }

  .main{margin-left:76px; flex:1; padding:0 40px 60px; overflow-x:hidden; min-width:0;}

  .hero{position:relative; padding:70px 20px 40px; text-align:center; max-width:640px; margin:0 auto; overflow:visible;}
  .hero-marquee{overflow:hidden; margin:0 auto 18px; max-width:520px;}
  .hero-marquee-track{display:flex; gap:16px; width:max-content; animation: marquee 16s linear infinite;}
  .hero-marquee-track img{
    width:90px; height:90px; border-radius:16px; object-fit:cover;
    box-shadow:0 12px 24px rgba(0,0,0,0.12); flex-shrink:0;
    animation: pulseZoom 3s ease-in-out infinite;
  }
  .hero-marquee-track img:nth-child(2n){animation-delay:0.6s;}
  .hero-marquee-track img:nth-child(3n){animation-delay:1.2s;}
  @keyframes marquee{
    0%{transform:translateX(0);}
    100%{transform:translateX(-50%);}
  }
  @keyframes pulseZoom{
    0%,100%{transform:scale(0.94);}
    50%{transform:scale(1.04);}
  }
  .wordmark{font-weight:900; font-size:3rem; color:var(--purple); letter-spacing:-1px; position:relative; z-index:2;}
  .search-bar{
    margin:22px auto 0; max-width:520px; display:flex; align-items:center;
    background:var(--card); border-radius:30px; padding:14px 8px 14px 22px; gap:10px; position:relative; z-index:2;
  }
  .search-bar input{border:none; background:transparent; outline:none; flex:1; font-family:'Poppins',sans-serif; font-size:0.95rem; color:var(--ink);}
  .search-go{width:38px; height:38px; border-radius:50%; background:var(--purple); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;}

  .pill-row{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; padding:20px 0 4px; position:relative; z-index:2;}
  .pill{display:flex; align-items:center; gap:8px; background:var(--card); border-radius:30px; padding:8px 16px 8px 8px; font-size:0.85rem; font-weight:500; cursor:pointer; border:none;}
  .pill-dot{width:24px; height:24px; border-radius:50%; background-size:cover; background-position:center;}

  .section{padding:28px 20px 4px;}
  .section-head{font-weight:600; font-size:1.1rem; margin-bottom:16px;}
  .page-title{font-size:1.7rem; font-weight:700; padding:36px 20px 8px;}
  .page-sub{padding:0 20px 20px; color:var(--grey); font-size:0.9rem;}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:18px; padding:0 20px;}
  .carousel{display:flex; gap:18px; overflow-x:auto; padding:0 20px 6px; scroll-behavior:smooth; scrollbar-width:none;}
  .carousel::-webkit-scrollbar{display:none;}
  .carousel .p-card{flex:0 0 190px;}
  .p-card{background:#fff; border:1px solid #eee; border-radius:16px; overflow:hidden;}
  .p-img{aspect-ratio:1/1; background-size:cover; background-position:center; position:relative;}
  .p-badge{position:absolute; top:8px; left:8px; background:var(--red); color:#fff; font-size:0.65rem; font-weight:700; padding:3px 8px; border-radius:20px;}
  .p-heart{position:absolute; top:8px; right:8px; width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,0.9); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:0.95rem;}
  .p-heart.saved{color:var(--red);}
  .p-body{padding:12px 12px 14px;}
  .p-name{font-size:0.85rem; font-weight:500; margin-bottom:4px; line-height:1.3;}
  .p-price-row{display:flex; align-items:center; justify-content:space-between;}
  .p-price{font-size:0.9rem; font-weight:700;}
  .p-old{font-size:0.72rem; color:var(--grey); text-decoration:line-through; margin-left:6px;}
  .p-cart-btn{width:30px; height:30px; border-radius:50%; border:none; background:var(--card); color:var(--purple); cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .p-cart-btn.added{background:var(--purple); color:#fff;}

  .filter-row{display:flex; gap:10px; flex-wrap:wrap; padding:0 20px 20px;}
  .filter-pill{background:var(--card); border:none; border-radius:30px; padding:8px 18px; font-size:0.85rem; font-weight:500; cursor:pointer;}
  .filter-pill.active{background:var(--purple); color:#fff;}

  .empty-state{text-align:center; padding:70px 20px; color:var(--grey);}
  .empty-state svg{margin-bottom:16px; opacity:0.4;}

  .cart-list{padding:0 20px;}
  .cart-item{display:flex; gap:16px; align-items:center; padding:16px 0; border-bottom:1px solid #eee;}
  .cart-thumb{width:70px; height:70px; border-radius:12px; background-size:cover; background-position:center; flex-shrink:0;}
  .cart-info{flex:1;}
  .cart-name{font-weight:600; font-size:0.9rem; margin-bottom:2px;}
  .cart-price{color:var(--grey); font-size:0.85rem;}
  .qty-controls{display:flex; align-items:center; gap:10px;}
  .qty-controls button{width:26px; height:26px; border-radius:50%; border:1px solid #ddd; background:#fff; cursor:pointer;}
  .remove-btn{color:var(--red); font-size:0.8rem; cursor:pointer; background:none; border:none; margin-left:10px;}
  .cart-summary{padding:24px 20px; display:flex; justify-content:space-between; align-items:center; font-weight:700; font-size:1.1rem;}
  .checkout-btn{background:var(--purple); color:#fff; border:none; padding:14px 32px; border-radius:30px; font-family:'Poppins',sans-serif; font-weight:600; cursor:pointer;}

  footer{border-top:1px solid #eee; margin-top:40px; padding:40px 20px;}
  .footer-grid{display:grid; grid-template-columns:2fr 1fr 1fr 1fr; gap:30px; margin-bottom:30px;}
  .footer-brand{font-weight:700; font-size:1.2rem; color:var(--purple); margin-bottom:8px;}
  .footer-brand p{font-size:0.85rem; color:var(--grey); max-width:280px; line-height:1.6; font-weight:400;}
  footer h4{font-size:0.85rem; font-weight:600; margin-bottom:12px;}
  footer ul{list-style:none;}
  footer li{margin-bottom:8px; font-size:0.85rem; color:var(--grey);}
  .footer-bottom{font-size:0.78rem; color:var(--grey); text-align:center; padding-top:20px; border-top:1px solid #eee;}

  /* ---------- RESPONSIVE: TABLET ---------- */
  @media (max-width:900px){
    .main{padding:0 20px 90px;}
    .footer-grid{grid-template-columns:1fr 1fr;}
  }

  /* ---------- RESPONSIVE: MOBILE ---------- */
  @media (max-width:768px){
    .layout{flex-direction:column;}
    .sidebar{
      width:100%; height:64px; flex-direction:row;
      position:fixed; top:auto; bottom:0; left:0; right:0;
      border-right:none; border-top:1px solid #eee;
      justify-content:space-around; padding:8px 0; gap:0;
    }
    .sidebar .logo-mark{display:none;}
    .side-btn{width:42px; height:42px;}
    .main{margin-left:0; padding:0 12px 90px;}
    .hero{padding:30px 10px 20px;}
    .float-img{display:none;}
    .wordmark{font-size:2.1rem;}
    .search-bar{max-width:100%;}
    .pill-row{gap:8px;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px;}
    .footer-grid{grid-template-columns:1fr; gap:24px;}
    .page-title{font-size:1.4rem; padding:24px 12px 6px;}
    .cart-item{flex-wrap:wrap;}
  }

  /* ---------- RESPONSIVE: LARGE DESKTOP ---------- */
  @media (min-width:1400px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));}
  }
</style>
</head>
<body>
<div class="layout">

  <div class="sidebar">
    <div class="logo-mark">h</div>
    <div class="side-btn active" data-view="home" title="Home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
    </div>
    <div class="side-btn" data-view="explore" title="Explore">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
    </div>
    <div class="side-btn" data-view="cart" title="Cart">

    <div class="side-btn" data-view="saved" title="Saved">

      <span class="badge" id="savedBadge" style="display:none;">0</span>

  </div>

  <div class="main" id="main"></div>
</div>

<script>
const products = [

  {id:12, name:'Long Wave Bundle', cat:'wavy', price:1890, img:'https://images.pexels.com/photos/11938406/pexels-photo-11938406.jpeg'},

  // Wigs
  {id:13, name:'Deep Wave Lace Wig', cat:'wig', price:2300, oldPrice:3070, img:'https://images.pexels.com/photos/6923222/pexels-photo-6923222.jpeg'},

  {id:15, name:'Retail Display Wig', cat:'wig', price:1950, img:'https://images.pexels.com/photos/13734819/pexels-photo-13734819.jpeg'},
  {id:16, name:'Blonde Streaked Wig', cat:'wig', price:1900, oldPrice:2375, img:'https://images.pexels.com/photos/14730872/pexels-photo-14730872.jpeg'},
  {id:17, name:'Vibrant Colored Wig', cat:'wig', price:1750, img:'https://images.pexels.com/photos/4718638/pexels-photo-4718638.jpeg'},

  // Lashes
  {id:18, name:'Classic Volume Lash Set', cat:'lashes', price:180, img:'https://images.pexels.com/photos/36930354/pexels-photo-36930354.jpeg'},
  {id:19, name:'Salon Lash Extension Kit', cat:'lashes', price:220, oldPrice:275, img:'https://images.pexels.com/photos/5128220/pexels-photo-5128220.jpeg'},
  {id:20, name:'Precision Lash Tool Set', cat:'lashes', price:150, img:'https://images.pexels.com/photos/5128268/pexels-photo-5128268.jpeg'},
  {id:21, name:'Dramatic Lash Bundle', cat:'lashes', price:195, img:'https://images.pexels.com/photos/8558536/pexels-photo-8558536.jpeg'},
  {id:22, name:'Everyday Flutter Lashes', cat:'lashes', price:130, oldPrice:165, img:'https://images.pexels.com/photos/8558524/pexels-photo-8558524.jpeg'},
  {id:23, name:'Premium Mink Lash Set', cat:'lashes', price:260, img:'https://images.pexels.com/photos/33723106/pexels-photo-33723106.jpeg'},

  // Nail Polish
  {id:24, name:'Glitter Nail Polish Duo', cat:'nailpolish', price:95, img:'https://images.pexels.com/photos/10609757/pexels-photo-10609757.jpeg'},
  {id:25, name:'Nude Nail Polish Set', cat:'nailpolish', price:110, oldPrice:140, img:'https://images.pexels.com/photos/2281695/pexels-photo-2281695.jpeg'},
  {id:27, name:'Gel Nail Color Bottle', cat:'nailpolish', price:85, img:'https://images.pexels.com/photos/18112338/pexels-photo-18112338.jpeg'},
  {id:28, name:'Dark Tone Polish Set', cat:'nailpolish', price:100, oldPrice:125, img:'https://images.pexels.com/photos/7321741/pexels-photo-7321741.jpeg'},
  {id:31, name:'Three-Piece Polish Collection', cat:'nailpolish', price:120, oldPrice:150, img:'https://images.pexels.com/photos/3631691/pexels-photo-3631691.jpeg'},
  {id:32, name:'Everyday Polish Set', cat:'nailpolish', price:90, img:'https://images.pexels.com/photos/6954964/pexels-photo-6954964.jpeg'},
  {id:33, name:'Bold Color Polish Duo', cat:'nailpolish', price:105, img:'https://images.pexels.com/photos/5238013/pexels-photo-5238013.jpeg'},

  // Nails
  {id:26, name:'Classic Red Manicure Kit', cat:'nails', price:150, img:'https://images.pexels.com/photos/3997384/pexels-photo-3997384.jpeg'},
  {id:29, name:'Nail Art Design Kit', cat:'nails', price:175, img:'https://images.pexels.com/photos/7066298/pexels-photo-7066298.jpeg'},
  {id:30, name:'Full Manicure Care Set', cat:'nails', price:230, img:'https://images.pexels.com/photos/5484948/pexels-photo-5484948.jpeg'},
  {id:34, name:'Press-On Nail Set', cat:'nails', price:140, oldPrice:175, img:'https://images.pexels.com/photos/7321737/pexels-photo-7321737.jpeg'},
  {id:35, name:'Nail Care Essentials Kit', cat:'nails', price:165, img:'https://images.pexels.com/photos/5870539/pexels-photo-5870539.jpeg'},
  {id:36, name:'Salon-Style Nail Set', cat:'nails', price:190, img:'https://images.pexels.com/photos/7321734/pexels-photo-7321734.jpeg'},

  // extra Straight / Curly / Wavy / Wig / Lashes for fuller rows

  {id:38, name:'Fresh Blow-Dry Straight Set', cat:'straight', price:1770, img:'https://images.pexels.com/photos/6144284/pexels-photo-6144284.jpeg'},
  {id:39, name:'Curly Fringe Bundle', cat:'curly', price:1390, img:'https://images.pexels.com/photos/6923241/pexels-photo-6923241.jpeg'},
  {id:40, name:'Defined Curl Set', cat:'curly', price:1520, oldPrice:1900, img:'https://images.pexels.com/photos/6923226/pexels-photo-6923226.jpeg'},
  {id:41, name:'Beach Wave Bundle', cat:'wavy', price:1950, img:'https://images.pexels.com/photos/6923450/pexels-photo-6923450.jpeg'},
  {id:42, name:'Loose Wave Closure', cat:'wavy', price:1400, img:'https://images.pexels.com/photos/6923465/pexels-photo-6923465.jpeg'},
  {id:43, name:'Colored Fashion Wig', cat:'wig', price:1680, img:'https://images.pexels.com/photos/5067451/pexels-photo-5067451.jpeg'},
  {id:44, name:'Everyday Wear Wig', cat:'wig', price:1590, oldPrice:1990, img:'https://images.pexels.com/photos/6923214/pexels-photo-6923214.jpeg'},
  {id:45, name:'Natural Look Lash Set', cat:'lashes', price:145, img:'https://images.pexels.com/photos/7755525/pexels-photo-7755525.jpeg'},
  {id:46, name:'Bold Wing Lash Set', cat:'lashes', price:210, oldPrice:260, img:'https://images.pexels.com/photos/8558545/pexels-photo-8558545.jpeg'},
];

let cart = [];
let saved = new Set();
let currentView = 'home';
let exploreFilter = 'all';
let searchQuery = '';

const categories = ['all','straight','curly','wavy','wig','lashes','nailpolish','nails'];
const catLabel = c => c === 'all' ? 'All' : c === 'wig' ? 'Wigs' : c === 'nailpolish' ? 'Nail Polish' : c.charAt(0).toUpperCase()+c.slice(1);

function money(n){ return 'GH₵' + n.toLocaleString(); }

function heartSVG(isSaved){
  return isSaved
    ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>'
    : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>';
}

function productCard(p){
  const isSaved = saved.has(p.id);
  const inCart = cart.some(c => c.id === p.id);
  return `
    <div class="p-card">
      <div class="p-img" style="background-image:url('${p.img}')">
        ${p.oldPrice ? `<div class="p-badge">${Math.round((1-p.price/p.oldPrice)*100)}% off</div>` : ''}
        <div class="p-heart ${isSaved?'saved':''}" onclick="toggleSave(${p.id})">${heartSVG(isSaved)}</div>
      </div>
      <div class="p-body">
        <div class="p-name">${p.name}</div>
        <div class="p-price-row">
          <div><span class="p-price">${money(p.price)}</span>${p.oldPrice ? `<span class="p-old">${money(p.oldPrice)}</span>`:''}</div>
          <button class="p-cart-btn ${inCart?'added':''}" onclick="addToCart(${p.id})">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h2l2.4 12.4a2 2 0 0 0 2 1.6h8.7a2 2 0 0 0 2-1.6L21 7H6"/></svg>
          </button>
        </div>
      </div>
    </div>`;
}

function toggleSave(id){ if(saved.has(id)) saved.delete(id); else saved.add(id); render(); }
function addToCart(id){
  const existing = cart.find(c => c.id === id);
  if(existing) existing.qty += 1; else cart.push({id, qty:1});
  render();
}
function changeQty(id, delta){
  const item = cart.find(c => c.id === id);
  if(!item) return;
  item.qty += delta;
  if(item.qty <= 0) cart = cart.filter(c => c.id !== id);
  render();
}
function removeFromCart(id){ cart = cart.filter(c => c.id !== id); render(); }
function switchView(view){
  currentView = view;
  document.querySelectorAll('.side-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  render();
}
function runSearch(){
  const val = document.getElementById('searchInput')?.value.trim().toLowerCase();
  searchQuery = val || '';
  exploreFilter = 'all';
  switchView('explore');
}
function setFilter(cat){ exploreFilter = cat; render(); }

document.querySelectorAll('.side-btn').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});

function renderHome(){
  const catSection = (cat, label) => {
    const list = products.filter(p => p.cat === cat);
    if(!list.length) return '';
    return `
      <div class="section">
        <div class="section-head">${label}</div>
        <div class="carousel">${list.map(productCard).join('')}</div>
      </div>`;
  };
  const marqueeImgs = [products[0], products[7], products[43], products[12], products[13], products[18], products[24]];
  const marqueeHTML = [...marqueeImgs, ...marqueeImgs].map(p => `<img src="${p.img}" alt="">`).join('');
  return `
    <div class="hero">
      <div class="hero-marquee">
        <div class="hero-marquee-track">${marqueeHTML}</div>
      </div>
      <div class="wordmark">hertify</div>
      <div class="search-bar">
        <input id="searchInput" type="text" placeholder="What are you shopping for today?" onkeydown="if(event.key==='Enter')runSearch()">
        <button class="search-go" onclick="runSearch()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </div>
      <div class="pill-row">
        ${categories.map(c => `
          <button class="pill" onclick="exploreFilter='${c}';searchQuery='';switchView('explore')">
            <span class="pill-dot" style="background-image:url('${(products.find(p=>p.cat===c)||products[0]).img}')"></span>
            ${catLabel(c)}
          </button>`).join('')}
      </div>
    </div>

    ${catSection('straight','Straight Hair')}
    ${catSection('curly','Curly Hair')}
    ${catSection('wavy','Wavy Hair')}
    ${catSection('wig','Wigs')}
    ${catSection('lashes','Lashes')}
    ${catSection('nailpolish','Nail Polish')}
    ${catSection('nails','Nails')}
  `;
}

function renderExplore(){
  let list = products;
  if(exploreFilter !== 'all') list = list.filter(p => p.cat === exploreFilter);
  if(searchQuery) list = list.filter(p => p.name.toLowerCase().includes(searchQuery) || p.cat.includes(searchQuery));
  return `
    <div class="page-title">Explore${searchQuery ? ` — results for "${searchQuery}"` : ''}</div>
    <div class="page-sub">Browse every product Hertify carries.</div>
    <div class="filter-row">
      ${categories.map(c => `<button class="filter-pill ${exploreFilter===c?'active':''}" onclick="searchQuery='';setFilter('${c}')">${catLabel(c)}</button>`).join('')}
    </div>
    <div class="grid">${list.length ? list.map(productCard).join('') : '<p style="padding:20px;color:var(--grey)">No products match that search.</p>'}</div>
  `;
}

function renderDeals(){
  const deals = products.filter(p => p.oldPrice);
  return `
    <div class="page-title">Deals</div>
    <div class="page-sub">Live discounts across Hertify right now.</div>
    <div class="grid">${deals.map(productCard).join('')}</div>
  `;
}

function renderSaved(){
  const list = products.filter(p => saved.has(p.id));
  if(!list.length){
    return `
      <div class="page-title">Saved</div>
      <div class="empty-state">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
        <div>Nothing saved yet</div>
        <p style="font-size:0.85rem;margin-top:6px;">Tap the heart on any product to save it here.</p>
      </div>`;
  }
  return `<div class="page-title">Saved</div><div class="grid">${list.map(productCard).join('')}</div>`;
}

function renderCart(){
  if(!cart.length){
    return `
      <div class="page-title">Your Cart</div>
      <div class="empty-state">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2 3h2l2.4 12.4a2 2 0 0 0 2 1.6h8.7a2 2 0 0 0 2-1.6L21 7H6"/></svg>
        <div>Your cart is empty</div>
        <p style="font-size:0.85rem;margin-top:6px;">Add products to see them here.</p>
      </div>`;
  }
  let subtotal = 0;
  const rows = cart.map(c => {
    const p = products.find(pr => pr.id === c.id);
    subtotal += p.price * c.qty;
    return `
      <div class="cart-item">
        <div class="cart-thumb" style="background-image:url('${p.img}')"></div>
        <div class="cart-info"><div class="cart-name">${p.name}</div><div class="cart-price">${money(p.price)} each</div></div>
        <div class="qty-controls">
          <button onclick="changeQty(${p.id},-1)">−</button><span>${c.qty}</span><button onclick="changeQty(${p.id},1)">+</button>
        </div>
        <button class="remove-btn" onclick="removeFromCart(${p.id})">Remove</button>
      </div>`;
  }).join('');
  return `
    <div class="page-title">Your Cart</div>
    <div class="cart-list">${rows}</div>
    <div class="cart-summary"><span>Subtotal</span><span>${money(subtotal)}</span></div>
    <div style="padding:0 20px;"><button class="checkout-btn">Checkout</button></div>
  `;
}

function renderFooter(){
  if(currentView !== 'home') return '';
  return `
    <footer>
      <div class="footer-grid">
        <div>
          <div class="footer-brand">hertify</div>
          <p>Hertify is Ghana's home for hair, lashes, and nails — born-straight, curly, wavy, and German-grade human hair, plus the finishing touches to match.</p>
        </div>
        <div><h4>Shop</h4><ul><li>Bundles</li><li>Wigs</li><li>Lashes</li><li>Nails</li></ul></div>
        <div><h4>Support</h4><ul><li>Shipping</li><li>Returns</li><li>Help Center</li></ul></div>
        <div><h4>Social</h4><ul><li>Instagram</li><li>TikTok</li><li>X (Twitter)</li></ul></div>
      </div>
      <div class="footer-bottom">© 2026 Hertify. All rights reserved.</div>
    </footer>
  `;
}

let carouselIntervals = [];
let placeholderInterval = null;
const searchSuggestions = [
  'Bone straight bundles',
  'Curly lace wigs',
  'Deep wave closures',
  'Nail polish sets',
  'Lash extensions',
  'German grade human hair',
  'Press-on nails'
];
function initPlaceholderRotation(){
  if(placeholderInterval) clearInterval(placeholderInterval);
  const input = document.getElementById('searchInput');
  if(!input) return;
  let i = 0;
  input.placeholder = searchSuggestions[0];
  placeholderInterval = setInterval(() => {
    i = (i + 1) % searchSuggestions.length;
    input.placeholder = searchSuggestions[i];
  }, 2200);
}

function initCarousels(){
  carouselIntervals.forEach(id => clearInterval(id));
  carouselIntervals = [];
  document.querySelectorAll('.carousel').forEach(el => {
    let paused = false;
    el.addEventListener('mouseenter', () => paused = true);
    el.addEventListener('mouseleave', () => paused = false);
    const id = setInterval(() => {
      if(paused) return;
      el.scrollLeft += 1;
      if(el.scrollLeft + el.clientWidth >= el.scrollWidth - 1) el.scrollLeft = 0;
    }, 25);
    carouselIntervals.push(id);
  });
}

function render(){
  document.getElementById('main').innerHTML = ({
    home: renderHome, explore: renderExplore, deals: renderDeals, saved: renderSaved, cart: renderCart,
  }[currentView] || renderHome)() + renderFooter();

  const cartCount = cart.reduce((s,c)=>s+c.qty,0);
  const cartBadge = document.getElementById('cartBadge');
  cartBadge.style.display = cartCount ? 'flex' : 'none';
  cartBadge.textContent = cartCount;

  const savedBadge = document.getElementById('savedBadge');
  savedBadge.style.display = saved.size ? 'flex' : 'none';
  savedBadge.textContent = saved.size;

  initCarousels();
  initPlaceholderRotation();
}

render();
</script>
</body>
</html>
